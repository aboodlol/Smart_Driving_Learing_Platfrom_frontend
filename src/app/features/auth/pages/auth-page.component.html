<section class="auth-wrapper row justify-content-center">
  <div class="col-12 col-md-8 col-lg-5 col-xl-4">
    <div class="auth-card">
      <mat-tab-group
        [selectedIndex]="activeTab()"
        (selectedIndexChange)="setTab($event)"
        animationDuration="0ms"
        mat-stretch-tabs="false"
        class="border-bottom"
        headerPosition="above"
      >
        <mat-tab label="Login"></mat-tab>
        <mat-tab label="Register"></mat-tab>
      </mat-tab-group>

      <div class="pt-4">
        @if (activeTab() === 0) {
          <h2 class="text-center fw-bold mb-4">Login</h2>
          <form class="form-stack" [formGroup]="loginForm" (ngSubmit)="submitLogin()">
            <mat-form-field appearance="outline" class="mb-0">
              <mat-label>Email</mat-label>
              <input matInput formControlName="email" type="email" autocomplete="email" />
            </mat-form-field>

            <mat-form-field appearance="outline" class="mb-0">
              <mat-label>Password</mat-label>
              <input
                matInput
                formControlName="password"
                [type]="hideLoginPassword() ? 'password' : 'text'"
                autocomplete="current-password"
              />
              <button mat-icon-button matSuffix (click)="hideLoginPassword.set(!hideLoginPassword())" type="button" tabindex="-1">
                <mat-icon>{{hideLoginPassword() ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
            </mat-form-field>

            <button mat-flat-button class="primary-btn py-3 fs-6 w-100 mt-3" type="submit" [disabled]="loading() || loginForm.invalid">
              @if (loading()) {
                <mat-spinner class="auth-spinner" diameter="18"></mat-spinner>
              }
              Login
            </button>
          </form>
        }

        @if (activeTab() === 1) {
          <h2 class="text-center fw-bold mb-4">Register</h2>
          <form class="form-stack" [formGroup]="registerForm" (ngSubmit)="submitRegister()">
            <mat-form-field appearance="outline">
              <mat-label>Full Name</mat-label>
              <input matInput formControlName="name" type="text" autocomplete="name" />
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Email</mat-label>
              <input matInput formControlName="email" type="email" autocomplete="email" />
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Password</mat-label>
              <input
                matInput
                formControlName="password"
                [type]="hideRegisterPassword() ? 'password' : 'text'"
                autocomplete="new-password"
              />
              <button mat-icon-button matSuffix (click)="hideRegisterPassword.set(!hideRegisterPassword())" type="button" tabindex="-1">
                <mat-icon>{{hideRegisterPassword() ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
            </mat-form-field>

            <button
              mat-flat-button
              class="primary-btn py-3 fs-6 w-100 mt-2"
              type="submit"
              [disabled]="loading() || registerForm.invalid"
            >
              @if (loading()) {
                <mat-spinner class="auth-spinner" diameter="18"></mat-spinner>
              }
              Register
            </button>
          </form>
        }
      </div>
    </div>
  </div>
</section>
