<div class="container py-4">
  @if (loading()) {
    <div class="text-center py-5">
      <div class="custom-spinner"></div>
      <p class="mt-3 loading-text">Loading chapter...</p>
    </div>
  } @else if (chapter(); as ch) {
    <a routerLink="/lessons" class="back-link">&larr; Back to Lessons</a>

    <div class="chapter-header">
      <h1>{{ ch.title }}</h1>
      <p class="chapter-desc">{{ ch.description }}</p>
    </div>

    <div class="sub-lessons-list">
      @for (sub of ch.lessons; track sub.title; let i = $index) {
        <div class="sub-lesson-card" [class.completed]="isCompleted(sub.title)">
          <div class="sub-lesson-number">{{ i + 1 }}</div>
          <div class="sub-lesson-body">
            <h3>{{ sub.title }}</h3>
            <p>{{ sub.content }}</p>
            <button
              class="btn-mark-complete"
              [disabled]="isCompleted(sub.title) || completing() === sub.title"
              (click)="markComplete(sub.title)"
            >
              @if (completing() === sub.title) {
                <div class="custom-spinner-sm"></div>
              } @else if (isCompleted(sub.title)) {
                &#x2705; Completed
              } @else {
                Mark as Complete
              }
            </button>
          </div>
        </div>
      }
    </div>
  }
</div>
